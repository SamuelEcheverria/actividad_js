<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sitio Base</title>
    <link rel="stylesheet" href="./css/tailwind.css" />
  </head>
  <body class="bg-gray-100 text-gray-900">
    <main class="min-h-screen px-6 py-12">
      <section class="mx-auto max-w-4xl">
        <nav class="mb-12 flex items-center justify-between">
          <a href="#" class="text-xl font-bold text-gray-900">Mi Sitio</a>
          <div class="space-x-4 text-sm font-medium">
            <a href="#" class="text-gray-600 hover:text-gray-900">Inicio</a>
            
            <a href="#" class="text-gray-600 hover:text-gray-900">Contacto</a>
          </div>
        </nav>

        <div class="rounded-lg bg-white p-8 shadow-sm">
          <p class="mb-3 text-sm font-semibold uppercase tracking-wide text-blue-600">
            TailwindCSS basico
          </p>
          <h1 class="mb-4 text-4xl font-bold tracking-tight text-gray-900">
            Un sitio estatico listo para editar
          </h1>
          <p class="mb-6 max-w-2xl text-lg leading-8 text-gray-600">
            Este ejemplo usa un archivo CSS separado para cargar Tailwind. Puedes
            cambiar colores, espacios, tamanos y layout directamente desde las
            clases del HTML.
          </p>
          <a
            href="#contenido"
            class="inline-block rounded-md bg-blue-600 px-5 py-3 font-semibold text-white hover:bg-blue-700"
          >
            Ver contenido
          </a>
        </div>

        <section id="contenido" class="mt-10 grid gap-6 md:grid-cols-3">
          <article class="rounded-lg bg-white p-6 shadow-sm">
            <h2 class="mb-2 text-xl font-semibold">Rapido</h2>
            <p class="text-gray-600"></p>
          </article>
          <article class="rounded-lg bg-white p-6 shadow-sm">
            <h2 class="mb-2 text-xl font-semibold">Editable</h2>
            <p class="text-gray-600"></p>
          </article>
          <article class="rounded-lg bg-white p-6 shadow-sm">
            <h2 class="mb-2 text-xl font-semibold">Simple</h2>
            <p class="text-gray-600">.</p>
          </article>
        </section>
      </section>
    </main>
  </body>
</html>
